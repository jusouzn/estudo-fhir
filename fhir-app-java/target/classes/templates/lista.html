<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Pacientes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Pacientes no Servidor HAPI</h2>
    <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>CPF</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${pacientes}">
                <td th:text="${p.idElement.idPart}"></td>
                <td th:text="${p.name[0].given[0]}"></td>
                <td th:text="${p.identifier[0].value}"></td>
            </tr>
        </tbody>
    </table>
    <a href="/" class="btn btn-primary">Voltar para Cadastro</a>
</body>
</html>
